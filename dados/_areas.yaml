# Áreas de Conhecimento — taxonomia e mapa slug→área.
# Toda disciplina (atual ou futura) precisa cair em uma área: ou pelo `mapa` abaixo
# (chave = slug da disciplina), ou por um campo `area: <id>` no próprio dados/<id>.yaml
# (que tem precedência). Se uma disciplina ficar sem área, o build FALHA de propósito.
areas:
  - id: linguagens
    nome: Linguagens e Comunicação
    icone: 📝
    cor: '#3a7ca5'
    descricao: Língua portuguesa e inglesa, redação, teorias e práticas de comunicação.
  - id: quantitativas
    nome: Matemática e Raciocínio Quantitativo
    icone: 🔢
    cor: '#d97706'
    descricao: Raciocínio lógico e analítico, matemática, estatística e probabilidade.
  - id: juridicas
    nome: Ciências Jurídicas
    icone: ⚖️
    cor: '#7b2230'
    descricao: Direito constitucional, administrativo, civil, penal, tributário e legislação.
  - id: economico-contabil
    nome: Ciências Econômicas, Contábeis e Financeiras
    icone: 💰
    cor: '#1f6f54'
    descricao: Economia, contabilidade, orçamento público, finanças e auditoria.
  - id: gestao-publica
    nome: Administração e Gestão Pública
    icone: 🏛️
    cor: '#6d597a'
    descricao: Teoria administrativa, gestão de pessoas e projetos, controle e ética pública.
  - id: tecnologia
    nome: Tecnologia da Informação
    icone: 💻
    cor: '#2563eb'
    descricao: Engenharia de software e dados, infraestrutura, segurança, IA e nuvem.
  - id: humanas-sociais
    nome: Ciências Humanas e Sociais
    icone: 🌍
    cor: '#b45309'
    descricao: Sociologia, história, geografia, atualidades e realidades regionais.
  - id: natureza-saude
    nome: Ciências da Natureza e Saúde
    icone: 🩺
    cor: '#15803d'
    descricao: Ciências da natureza, nutrição, saúde pública e saúde mental.
  - id: assistencia-social
    nome: Serviço Social e Assistência (SUAS)
    icone: 🤝
    cor: '#be185d'
    descricao: Fundamentos do serviço social, política de assistência e práticas no SUAS.
  - id: educacao
    nome: Educação e Pedagogia
    icone: 📚
    cor: '#7c3aed'
    descricao: Fundamentos da educação, pedagogia social e intervenção pedagógica.
  - id: psicologia
    nome: Psicologia
    icone: 🧠
    cor: '#0891b2'
    descricao: Psicologia social, avaliação psicológica e ética profissional.

# slug da disciplina -> id da área
