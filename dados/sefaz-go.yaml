disciplinas:
- slug: lingua-portuguesa
  titulo: Língua Portuguesa
  grupo: Conhecimentos Básicos
  icone: 📝
  resumo: Compreensão e interpretação de textos, gramática aplicada e redação de documentos oficiais.
  topicos:
  - titulo: 1. Interpretação de texto
    explicacao: 'Interpretar é ir além do que está escrito: identificar tese, argumentos, intenção do autor, relações de causa/consequência e inferências. Em prova, a maior parte dos erros vem de extrapolar (afirmar o que o texto não diz) ou de reduzir (ignorar ressalvas como ''em geral'', ''pode'', ''salvo'').'
    subtopicos:
    - titulo: Compreensão x interpretação
      texto: Compreensão = o que o texto diz explicitamente. Interpretação = o que se pode concluir logicamente a partir dele. Cuidado com inferências que exigem conhecimento externo não autorizado pelo texto.
    - titulo: Ideia central e secundárias
      texto: Localize o tópico frasal de cada parágrafo. A ideia central costuma aparecer na introdução ou conclusão; as secundárias dão sustentação (exemplos, dados, contra-argumentos).
    - titulo: Inferência e pressuposto
      texto: 'Pressuposto está implícito na própria estrutura da frase (ex.: ''continuou estudando'' pressupõe que já estudava). Subentendido depende do contexto.'
    prova:
    - 1
    - 2
    - 3
    - 7
    - 8
  - titulo: 2. Ortografia, acentuação e crase
    explicacao: 'Domínio das regras do Acordo Ortográfico vigente. A crase (fusão da preposição ''a'' com o artigo ''a'') é tema recorrente: ocorre diante de palavra feminina que admita artigo e seja regida por preposição ''a''.'
    subtopicos:
    - titulo: Acentuação gráfica
      texto: 'Oxítonas terminadas em a/e/o, ditongos abertos éi/éu/ói só em oxítonas, hiatos i/u tônicos sozinhos ou com s. Lembre: paroxítonas não recebem acento em ditongos abertos após o Acordo (ex.: ideia, heroico).'
    - titulo: Emprego da crase
      texto: Usa-se antes de palavra feminina ('vou à escola'), nas locuções ('às vezes', 'à medida que') e na indicação de horas ('às 8h'). Não se usa antes de verbo, de palavra masculina ou de pronome que rejeita artigo.
  - titulo: 3. Classes de palavras
    explicacao: Substantivo, adjetivo, numeral, pronome, verbo, advérbio, preposição, conjunção, interjeição e artigo. Reconhecer a classe e a função é base para concordância, regência e pontuação.
    subtopicos:
    - titulo: Pronomes
      texto: Pessoais, possessivos, demonstrativos, relativos e indefinidos. Os relativos (que, qual, cujo, onde) ligam orações e exigem atenção à regência do verbo da oração adjetiva.
    - titulo: Conjunções
      texto: Coordenativas (aditiva, adversativa, alternativa, conclusiva, explicativa) e subordinativas (causal, condicional, concessiva, consecutiva etc.). Determinam o sentido lógico entre orações.
  - titulo: '4. Sintaxe: regência, concordância e colocação'
    explicacao: Regência trata da relação entre verbo/nome e seus complementos (com ou sem preposição). Concordância (verbal e nominal) ajusta as palavras em número, pessoa e gênero. Colocação pronominal define próclise, mesóclise e ênclise.
    subtopicos:
    - titulo: Concordância verbal e nominal
      texto: Verbo concorda com o sujeito; nas estruturas com 'haver' (existir) o verbo é impessoal. Atenção a sujeito composto, partitivos e expressões como 'mais de um'.
    - titulo: Regência verbal e nominal
      texto: 'Ex.: ''assistir a um filme'' (ver), ''obedecer a alguém''. A regência justifica o uso ou não da crase e a escolha do pronome relativo (a que, em que, de que).'
    - titulo: Colocação pronominal
      texto: Próclise (pronome antes) com palavras atrativas (negação, advérbio, pronomes relativos); mesóclise no futuro do presente/pretérito sem atração; ênclise como regra padrão no início de oração.
    prova:
    - 4
  - titulo: 5. Pontuação, coordenação e subordinação
    explicacao: A pontuação organiza o período e marca relações sintáticas. Vírgula separa termos de mesma função, isola apostos/vocativos e adjuntos deslocados, mas não separa sujeito de predicado nem verbo de objeto.
    subtopicos:
    - titulo: Período composto
      texto: Coordenação une orações independentes; subordinação cria dependência (substantivas, adjetivas, adverbiais). Reconhecer o tipo orienta a pontuação.
    - titulo: Orações adjetivas
      texto: Explicativas vêm entre vírgulas (informação acessória); restritivas, sem vírgula (delimitam o sentido). Trocar uma pela outra altera o significado.
  - titulo: 6. Semântica e estilística
    explicacao: 'Estuda significado: sinonímia, antonímia, polissemia, ambiguidade, conotação/denotação e figuras de linguagem. Coesão e coerência garantem a articulação textual.'
    subtopicos:
    - titulo: Coesão e coerência
      texto: Coesão é a amarração formal (conectivos, pronomes, elipses); coerência é a unidade de sentido. Substituir um conectivo pode quebrar a lógica argumentativa.
    - titulo: Figuras de linguagem
      texto: Metáfora, metonímia, ironia, eufemismo, hipérbole. Em textos oficiais predomina a denotação; figuras aparecem mais na interpretação de textos literários/jornalísticos.
    prova:
    - 6
  - titulo: 7. Redação oficial
    explicacao: Reconhecimento e produção de correspondências e atos oficiais conforme o padrão do Manual de Redação. Prioriza clareza, concisão, impessoalidade, formalidade e uso do padrão culto.
    subtopicos:
    - titulo: Atributos do texto oficial
      texto: Impessoalidade, linguagem formal padrão, clareza, concisão, uniformidade. Evita-se rebuscamento e ambiguidade.
    - titulo: Tipos de documentos
      texto: Ofício (padrão único de comunicação oficial), memorando, parecer, despacho, ata, relatório. Conhecer o fecho, o vocativo e o pronome de tratamento adequados.
  - titulo: 8. Correlação de tempos e modos verbais
    explicacao: Articulação entre tempos e modos verbais (indicativo x subjuntivo, condicionais e hipotéticas) — frequente na FCC.
    subtopicos:
    - titulo: Correlação verbal e estruturas hipotéticas
      texto: 'Consecutio temporum: ''se tivéssemos querido, teria sido''; futuro do presente/pretérito; subjuntivo nas condicionais/concessivas.'
    prova:
    - 10
  - titulo: 9. Reescrita e equivalência de sentido
    explicacao: Reescrever frases/trechos mantendo sentido, correção e registro — substituição de palavras e reorganização sintática.
    subtopicos:
    - titulo: Paráfrase com manutenção de sentido
      texto: Equivalência semântica, sinonímia de expressões, regência ao trocar verbos (apelar a, recorrer a, requerer) e mudança de voz.
    prova:
    - 5
    - 9
- slug: raciocinio-logico
  titulo: Raciocínio Lógico, Matemática Financeira e Estatística
  grupo: Conhecimentos Básicos
  icone: 📊
  resumo: Lógica proposicional, sequências, finanças (juros, descontos) e estatística descritiva e probabilidade.
  topicos:
  - titulo: 1. Estrutura lógica de relações
    explicacao: Deduzir informações a partir de relações entre pessoas, lugares, objetos ou eventos fictícios. Inclui problemas de associação lógica (tabelas-verdade de correspondência) e diagramas.
    subtopicos:
    - titulo: Problemas de associação
      texto: Montar tabela cruzando elementos e eliminar combinações impossíveis a partir das pistas. Técnica do 'verdadeiro/falso' por linha e coluna.
  - titulo: 2. Lógica proposicional
    explicacao: 'Proposições simples e compostas com conectivos: conjunção (e), disjunção (ou), condicional (se...então), bicondicional (se e somente se) e negação. Tabelas-verdade definem o valor lógico.'
    subtopicos:
    - titulo: Conectivos e tabela-verdade
      texto: Conjunção só é V se ambas V; disjunção só é F se ambas F; condicional só é F quando V→F; bicondicional é V quando os valores são iguais.
    - titulo: Tautologia, contradição e contingência
      texto: Tautologia é sempre verdadeira; contradição, sempre falsa; contingência depende dos valores. Importante para verificar equivalências.
    - titulo: Equivalências e negações
      texto: 'Leis de De Morgan: ~(p∧q)=~p∨~q. Negação do condicional: ~(p→q)=p∧~q. Equivalência: p→q ≡ ~q→~p (contrapositiva).'
  - titulo: 3. Argumentação e quantificadores
    explicacao: Validade de argumentos (premissas → conclusão) e uso dos quantificadores 'todo', 'algum', 'nenhum' com diagramas de Venn. Um argumento é válido quando a conclusão decorre necessariamente das premissas.
    subtopicos:
    - titulo: Argumentos válidos
      texto: Modus ponens (p→q, p ∴ q), modus tollens (p→q, ~q ∴ ~p), silogismo hipotético. Distinguir validade (forma) de verdade (conteúdo).
    - titulo: Quantificadores
      texto: Negação de 'todo A é B' é 'algum A não é B'. Negação de 'algum' é 'nenhum'. Diagramas ajudam a testar conclusões.
  - titulo: 4. Sequências, matrizes e análise combinatória
    explicacao: Padrões numéricos e figurais, progressões aritmética (PA) e geométrica (PG), além de contagem por princípio multiplicativo, permutações, arranjos e combinações.
    subtopicos:
    - titulo: PA e PG
      texto: 'PA: an = a1 + (n−1)r; soma Sn = (a1+an)·n/2. PG: an = a1·q^(n−1); soma finita Sn = a1(q^n−1)/(q−1).'
    - titulo: Análise combinatória
      texto: Arranjo importa a ordem (A=n!/(n−p)!); combinação não (C=n!/[p!(n−p)!]); permutação é arranjo de todos os elementos.
    - titulo: Conjuntos
      texto: Operações de união, interseção e diferença; princípio da inclusão-exclusão para contagem em diagramas de Venn.
  - titulo: 5. Probabilidade
    explicacao: Razão entre casos favoráveis e casos possíveis em espaço amostral equiprovável. Inclui probabilidade da união, condicional e independência de eventos.
    subtopicos:
    - titulo: Regras fundamentais
      texto: 'P(A∪B)=P(A)+P(B)−P(A∩B). Eventos independentes: P(A∩B)=P(A)·P(B). Probabilidade condicional: P(A|B)=P(A∩B)/P(B).'
    prova:
    - 13
    - 14
  - titulo: 6. Matemática Financeira
    explicacao: Juros simples e compostos, descontos, taxas de juros, equivalência de capitais, séries de pagamentos (amortização) e fluxo de caixa. Base para análise tributária e econômica.
    subtopicos:
    - titulo: Juros simples e compostos
      texto: 'Simples: J = C·i·t (linear). Compostos: M = C·(1+i)^t (exponencial, juro sobre juro). Diferença cresce com o tempo.'
    - titulo: Descontos
      texto: Desconto simples comercial (sobre o valor nominal) e racional (sobre o valor atual). Comum em títulos antecipados.
    - titulo: Taxas e equivalência
      texto: Taxas nominal, efetiva e equivalente; capitais são equivalentes quando, levados a uma mesma data por uma taxa, têm o mesmo valor.
    - titulo: Amortização
      texto: Sistemas SAC (amortização constante) e Price (prestação constante). Compreender a composição juros+amortização de cada parcela.
    prova:
    - 19
  - titulo: 7. Estatística descritiva
    explicacao: 'Organização e resumo de dados: tabelas, gráficos, medidas de posição (média, mediana, moda), de dispersão (variância, desvio-padrão) e de assimetria/curtose.'
    subtopicos:
    - titulo: Medidas de posição
      texto: Média (sensível a outliers), mediana (valor central, robusta) e moda (mais frequente). Quartis e percentis localizam pontos da distribuição.
    - titulo: Medidas de dispersão
      texto: Amplitude, variância, desvio-padrão e coeficiente de variação. Medem o quanto os dados se afastam da média.
    - titulo: Distribuições de probabilidade
      texto: Binomial (eventos discretos com 2 resultados), Poisson (eventos raros), Normal (contínua, simétrica) e t de Student (amostras pequenas).
    - titulo: Amostragem e estimação
      texto: Amostra probabilística representa a população; estimação por ponto e por intervalo de confiança; testes de hipótese para validar afirmações sobre parâmetros.
  - titulo: 8. Distribuição exponencial
    explicacao: Modelo contínuo do tempo até um evento; densidade, probabilidade de cauda e a propriedade de falta de memória.
    subtopicos:
    - titulo: Falta de memória da exponencial
      texto: f(x)=λe^{-λx}, P(X>t)=e^{-λt}, média 1/λ; P(X>s+t | X>s)=P(X>t) — usado em tempo de vida de componentes.
    prova:
    - 11
  - titulo: '9. Inferência aplicada: amostra e erros'
    explicacao: Dimensionamento de amostra para proporção e cálculo das probabilidades de erro tipo I e II.
    subtopicos:
    - titulo: Tamanho de amostra para proporção
      texto: n=(z/E)^2·p(1-p), com pior caso p=0,5; exemplo com z=1,64 e E=2%.
    - titulo: Cálculo do erro tipo II (β)
      texto: β = P(não rejeitar H0 | H1 verdadeira); definir região crítica e calcular sob H1; poder = 1-β.
    prova:
    - 12
    - 16
  - titulo: 10. Probabilidade total e teorema de Bayes
    explicacao: Marginalizar por uma partição de eventos e inverter condicionais (Bayes), inclusive em árvores de vários níveis.
    subtopicos:
    - titulo: Lei da probabilidade total e Bayes
      texto: P(B)=Σ P(Ai)·P(B|Ai); P(Ai|B)=P(Ai)P(B|Ai)/P(B). Árvores chuva→trânsito→atraso.
    prova:
    - 15
  - titulo: 11. Teste qui-quadrado de independência
    explicacao: 'Tabela de contingência: frequências esperadas, estatística qui-quadrado, graus de liberdade e decisão pela tabela.'
    subtopicos:
    - titulo: Frequências esperadas e estatística
      texto: E_ij=(total linha·total coluna)/total geral; χ²=Σ(O-E)²/E.
    - titulo: Graus de liberdade e decisão
      texto: gl=(l-1)(c-1); rejeita-se H0 se χ² calculado > valor crítico tabelado.
    prova:
    - 17
    - 18
  - titulo: 12. Equivalência de capitais aplicada
    explicacao: Comparar pagamento à vista com desconto x parcelado sem acréscimo e extrair a taxa de juros embutida.
    subtopicos:
    - titulo: À vista com desconto x parcelado
      texto: Igualar o valor à vista ao valor presente das parcelas e isolar i; taxa embutida no parcelamento 'sem juros'.
    prova:
    - 20
- slug: direito-constitucional
  titulo: Direito Constitucional
  grupo: Conhecimentos Básicos
  icone: ⚖️
  resumo: Constituição, princípios fundamentais, direitos e garantias, organização do Estado, Poderes e tributação na CF/88.
  topicos:
  - titulo: 1. Constituição da República de 1988
    explicacao: Estudo do texto constitucional como norma suprema. A CF/88 é rígida (exige processo legislativo especial para emendas), analítica (extensa) e dirigente (estabelece programas e metas ao Estado).
    subtopicos:
    - titulo: Aplicabilidade das normas
      texto: Normas de eficácia plena (aplicação imediata), contida (aplicação imediata, mas restringível por lei) e limitada (dependem de regulamentação para produzir todos os efeitos).
    - titulo: Princípios fundamentais (arts. 1º a 4º)
      texto: Fundamentos da República (soberania, cidadania, dignidade, valores sociais do trabalho e da livre iniciativa, pluralismo político), objetivos e princípios das relações internacionais.
  - titulo: 2. Direitos e garantias fundamentais
    explicacao: Direitos individuais e coletivos (art. 5º), sociais, de nacionalidade e políticos. Os remédios constitucionais (habeas corpus, mandado de segurança, habeas data, mandado de injunção, ação popular) protegem esses direitos.
    subtopicos:
    - titulo: Direitos individuais e coletivos
      texto: Igualdade, legalidade, liberdade de expressão, devido processo legal, contraditório e ampla defesa, inviolabilidade de domicílio e sigilos. São cláusulas pétreas.
    - titulo: Direitos sociais, nacionalidade e políticos
      texto: Direitos sociais (art. 6º), regras de aquisição/perda da nacionalidade e dos direitos políticos (alistamento, elegibilidade, inelegibilidades).
    prova:
    - 21
    - 25
    - 27
    - 28
  - titulo: 3. Organização do Estado
    explicacao: 'Federação brasileira: União, Estados, DF e Municípios, todos autônomos. Distribuição de competências (administrativas e legislativas) e repartição de receitas.'
    subtopicos:
    - titulo: Repartição de competências
      texto: Competências privativas da União, comuns (administrativas a todos os entes) e concorrentes (legislação onde a União fixa normas gerais e os Estados suplementam).
    - titulo: Administração Pública (arts. 37 a 41)
      texto: Princípios LIMPE (legalidade, impessoalidade, moralidade, publicidade, eficiência), concursos, servidores públicos, estabilidade e responsabilidade.
    prova:
    - 22
    - 26
  - titulo: 4. Organização dos Poderes
    explicacao: Separação e independência entre Legislativo, Executivo e Judiciário, com freios e contrapesos. Inclui processo legislativo, funções de cada Poder e funções essenciais à Justiça.
    subtopicos:
    - titulo: Processo legislativo
      texto: Espécies normativas (EC, LC, LO, medidas provisórias, leis delegadas), iniciativa, tramitação, sanção/veto e quóruns. Essencial para o Direito Tributário.
    - titulo: Poder Judiciário e funções essenciais
      texto: STF como guardião da Constituição, controle de constitucionalidade (difuso e concentrado), Ministério Público, Advocacia Pública e Defensoria.
    prova:
    - 29
  - titulo: 5. Tributação, orçamento e ordem econômica
    explicacao: O Sistema Tributário Nacional na CF (arts. 145 a 162), as finanças públicas (arts. 163 a 169) e a ordem econômica e financeira (arts. 170 e seguintes) constituem o núcleo de interesse fiscal.
    subtopicos:
    - titulo: Sistema Tributário Nacional
      texto: Espécies tributárias, limitações ao poder de tributar (princípios e imunidades), competências e repartição de receitas tributárias entre os entes.
    - titulo: Ordem econômica e financeira
      texto: Princípios da ordem econômica (livre iniciativa, livre concorrência, função social da propriedade) e atuação do Estado como agente normativo e regulador.
- slug: direito-administrativo
  titulo: Direito Administrativo
  grupo: Conhecimentos Básicos
  icone: 🏛️
  resumo: Regime jurídico-administrativo, atos, poderes, organização, agentes, licitações, controle e responsabilidade do Estado.
  topicos:
  - titulo: 1. Estado, governo e Administração Pública
    explicacao: 'Conceitos de Estado (elementos: povo, território, governo soberano) e de Administração Pública nos sentidos subjetivo (órgãos/agentes) e objetivo (atividade administrativa).'
    subtopicos:
    - titulo: Princípios administrativos
      texto: Expressos (LIMPE) e implícitos (supremacia e indisponibilidade do interesse público, razoabilidade, proporcionalidade, autotutela, segurança jurídica).
  - titulo: 2. Organização administrativa
    explicacao: Administração direta (entes políticos e seus órgãos) e indireta (autarquias, fundações públicas, empresas públicas e sociedades de economia mista). Estuda desconcentração e descentralização.
    subtopicos:
    - titulo: Desconcentração x descentralização
      texto: Desconcentração distribui competências dentro da mesma pessoa jurídica (hierarquia). Descentralização transfere a outra pessoa (vínculo de tutela/supervisão).
    - titulo: Entidades da Administração indireta
      texto: Autarquias (regime público), fundações, empresas públicas e sociedades de economia mista (regime predominantemente privado).
  - titulo: 3. Atos administrativos
    explicacao: Manifestação unilateral da Administração que produz efeitos jurídicos. Possuem requisitos (competência, finalidade, forma, motivo, objeto) e atributos (presunção de legitimidade, imperatividade, autoexecutoriedade, tipicidade).
    subtopicos:
    - titulo: Requisitos e atributos
      texto: Vícios em qualquer requisito podem anular o ato. Competência e finalidade são vinculados; motivo e objeto podem ser discricionários.
    - titulo: Classificação e extinção
      texto: Vinculados x discricionários; anulação (por ilegalidade, efeitos ex tunc), revogação (por conveniência, ex nunc) e convalidação de vícios sanáveis.
  - titulo: 4. Poderes da Administração
    explicacao: 'Prerrogativas para atender o interesse público: poder vinculado, discricionário, hierárquico, disciplinar, regulamentar e de polícia.'
    subtopicos:
    - titulo: Poder de polícia
      texto: 'Limita o exercício de direitos individuais em prol da coletividade (fiscalização tributária, sanitária, ambiental). Atributos: discricionariedade, autoexecutoriedade e coercibilidade.'
    - titulo: Poder disciplinar e hierárquico
      texto: Hierárquico organiza e ordena; disciplinar apura e pune infrações funcionais por meio do processo administrativo.
    prova:
    - 34
  - titulo: 5. Agentes públicos
    explicacao: Toda pessoa que exerce função pública, ainda que transitoriamente. Inclui agentes políticos, servidores estatutários, empregados públicos e particulares em colaboração.
    subtopicos:
    - titulo: Regime e responsabilidade
      texto: Provimento, vacância, direitos e deveres, regime disciplinar. Responsabilidade civil, penal e administrativa, que são independentes entre si.
    prova:
    - 32
  - titulo: 6. Licitações e contratos (Lei 14.133/2021)
    explicacao: Procedimento para seleção da proposta mais vantajosa, regido pela nova Lei de Licitações. Princípios, modalidades, fases e hipóteses de contratação direta.
    subtopicos:
    - titulo: Modalidades e fases
      texto: Pregão, concorrência, concurso, leilão e diálogo competitivo. Fase preparatória, divulgação, apresentação de propostas, julgamento, habilitação e homologação.
    - titulo: Contratação direta
      texto: Dispensa e inexigibilidade de licitação (quando a competição é inviável). Exige justificativa e formalização adequada.
    prova:
    - 31
  - titulo: 7. Controle, responsabilidade e improbidade
    explicacao: Controle interno, externo (Tribunais de Contas) e judicial da Administração. Responsabilidade civil do Estado (objetiva) e improbidade administrativa (Lei 8.429/1992).
    subtopicos:
    - titulo: Responsabilidade civil do Estado
      texto: 'Regra objetiva (teoria do risco administrativo): basta o nexo entre conduta e dano; admite excludentes (culpa exclusiva da vítima, caso fortuito/força maior).'
    - titulo: Improbidade administrativa
      texto: Atos que importam enriquecimento ilícito, prejuízo ao erário ou violação a princípios. A Lei 14.230/2021 alterou o regime, exigindo dolo.
    prova:
    - 36
    - 37
  - titulo: 8. Processo administrativo e acesso à informação
    explicacao: Processo administrativo (Lei 9.784/1999) garante contraditório, motivação e razoável duração. A Lei de Acesso à Informação (12.527/2011) assegura transparência.
    subtopicos:
    - titulo: Bens públicos e intervenção na propriedade
      texto: Bens de uso comum, especial e dominical; desapropriação, servidão, requisição, tombamento e limitações administrativas.
  - titulo: 9. Concessões e Parcerias Público-Privadas (PPP)
    explicacao: 'Delegação de serviços públicos: concessão comum (Lei 8.987/95) e PPPs (Lei 11.079/04), com matriz de riscos e contraprestação.'
    subtopicos:
    - titulo: Concessão, permissão e PPP
      texto: Concessão comum x patrocinada x administrativa; equilíbrio econômico-financeiro; bens reversíveis; contraprestação do poder concedente.
    prova:
    - 35
  - titulo: 10. Terceiro setor e organizações sociais
    explicacao: 'Entidades paraestatais: OS (Lei 9.637/98), OSCIP, serviços sociais autônomos e o MROSC (Lei 13.019/14).'
    subtopicos:
    - titulo: OS, OSCIP e contrato de gestão
      texto: Qualificação, contrato de gestão/termo de parceria, dispensa de licitação, controle pelo TC; chamamento público no MROSC.
    prova:
    - 38
  - titulo: 11. Uso de bens públicos por particular
    explicacao: Formas de uso privativo de bem público por particular e seu regime.
    subtopicos:
    - titulo: Autorização, permissão e concessão de uso
      texto: Uso comum x especial x privativo; precariedade; com/sem licitação; oneroso/gratuito; afetação e desafetação.
    prova:
    - 33
  - titulo: 12. Controle da Administração Pública
    explicacao: Mecanismos de controle interno, externo e judicial dos atos administrativos.
    subtopicos:
    - titulo: Controle interno, externo e judicial
      texto: Autotutela (Súmulas 346/473 STF); controle do Legislativo e dos Tribunais de Contas; controle de legalidade x mérito; tutela.
    prova:
    - 39
- slug: direito-financeiro
  titulo: Direito Financeiro
  grupo: Conhecimentos Básicos
  icone: 💰
  resumo: Orçamento público (PPA, LDO, LOA), receita e despesa, créditos adicionais, dívida pública e responsabilidade fiscal.
  topicos:
  - titulo: 1. Orçamento público e leis orçamentárias
    explicacao: 'O ciclo orçamentário se estrutura em três leis integradas: PPA (planejamento de médio prazo, 4 anos), LDO (metas e prioridades anuais, regras) e LOA (orçamento anual com previsão de receitas e fixação de despesas).'
    subtopicos:
    - titulo: PPA, LDO e LOA
      texto: 'PPA define diretrizes, objetivos e metas; LDO faz a ponte e orienta a elaboração da LOA; LOA materializa o orçamento do exercício. Princípios: unidade, universalidade, anualidade, exclusividade.'
  - titulo: 2. Receita pública
    explicacao: 'Ingressos de recursos aos cofres públicos. Classifica-se em originária (patrimônio do Estado) e derivada (poder de império — tributos). Quanto ao orçamento: corrente e de capital.'
    subtopicos:
    - titulo: Estágios da receita
      texto: Previsão, lançamento, arrecadação e recolhimento. A classificação por categoria econômica separa receitas correntes (tributárias, contribuições) de capital (operações de crédito, alienação de bens).
    prova:
    - 42
  - titulo: 3. Despesa pública
    explicacao: Aplicação de recursos públicos. Classifica-se em corrente (manutenção, custeio) e de capital (investimentos, inversões, amortização da dívida). Segue estágios legais de execução.
    subtopicos:
    - titulo: Estágios da despesa
      texto: Empenho (reserva de dotação), liquidação (verificação do direito do credor) e pagamento. Restos a pagar e despesas de exercícios anteriores são exceções controladas.
  - titulo: 4. Créditos adicionais
    prova:
    - 43
    explicacao: Autorizações de despesa não computadas ou insuficientes na LOA. Dividem-se em suplementares (reforço), especiais (nova dotação) e extraordinários (urgência imprevisível, como guerra/calamidade).
    subtopicos:
    - titulo: Tipos e fontes
      texto: Suplementares e especiais dependem de autorização legislativa e indicação de recursos; extraordinários abrem-se por MP ou decreto, dada a urgência.
  - titulo: 5. Dívida pública e endividamento
    explicacao: Compromissos financeiros do Estado. Distingue dívida flutuante (curto prazo, restos a pagar) de fundada/consolidada (longo prazo). Operações de crédito captam recursos por endividamento.
    subtopicos:
    - titulo: Limites e controle
      texto: A LRF e resoluções do Senado fixam limites de endividamento e operações de crédito. A 'regra de ouro' veda crédito que financie despesa corrente além do permitido.
    prova:
    - 41
  - titulo: 6. Responsabilidade Fiscal (LC 101/2000)
    explicacao: A LRF impõe planejamento, transparência e equilíbrio entre receitas e despesas, com limites para pessoal e endividamento e mecanismos de compensação para renúncias e novas despesas.
    subtopicos:
    - titulo: Gestão fiscal responsável
      texto: Metas fiscais na LDO, limites de despesa com pessoal, renúncia de receita compensada, vedações em fim de mandato e relatórios de gestão fiscal.
    prova:
    - 45
  - titulo: 7. Emendas e transferências especiais
    explicacao: Emendas parlamentares impositivas e a transferência especial (art. 166-A, CF; EC 105/2019).
    subtopicos:
    - titulo: Transferência especial (art. 166-A)
      texto: Dispensa convênio; recursos integram o patrimônio do ente; vedada despesa de pessoal; aplicação mínima em investimento.
    prova:
    - 44
- slug: direito-civil-empresarial
  titulo: Direito Civil e Empresarial
  grupo: Conhecimentos Básicos
  icone: 📜
  resumo: Pessoas, bens, fatos e negócios jurídicos, obrigações, contratos e o regime do Direito de Empresa.
  topicos:
  - titulo: 1. Lei de Introdução e aplicação das normas
    explicacao: A LINDB (DL 4.657/1942) trata de vigência, eficácia, interpretação e integração das normas (analogia, costumes, princípios gerais). Os arts. 20 a 30 trouxeram regras sobre segurança jurídica na atuação pública.
    subtopicos:
    - titulo: Integração e interpretação
      texto: Na omissão da lei, o juiz decide por analogia, costumes e princípios gerais do direito. A LINDB também rege a aplicação da lei no tempo e no espaço.
  - titulo: 2. Pessoas e bens
    explicacao: Pessoa natural (personalidade, capacidade, direitos da personalidade) e pessoa jurídica (constituição, tipos, desconsideração). Bens classificam-se quanto à mobilidade, divisibilidade e fungibilidade.
    subtopicos:
    - titulo: Pessoa jurídica
      texto: Início, registro, espécies (direito público e privado) e desconsideração da personalidade jurídica em caso de abuso, desvio de finalidade ou confusão patrimonial.
    - titulo: Domicílio e bens
      texto: Bens móveis/imóveis, fungíveis/infungíveis, públicos/particulares. Domicílio é o centro de atividades jurídicas da pessoa.
  - titulo: 3. Fatos e negócios jurídicos
    explicacao: O negócio jurídico exige agente capaz, objeto lícito/possível e forma prescrita ou não defesa. Estuda planos de existência, validade e eficácia, além dos defeitos e invalidades.
    subtopicos:
    - titulo: Defeitos do negócio jurídico
      texto: Vícios de consentimento (erro, dolo, coação, estado de perigo, lesão) e vício social (fraude contra credores, simulação). Geram anulabilidade ou nulidade.
    - titulo: Prescrição e decadência
      texto: Prescrição extingue a pretensão; decadência extingue o próprio direito potestativo. Distinção relevante em matéria de crédito tributário.
    prova:
    - 48
  - titulo: 4. Obrigações e responsabilidade civil
    explicacao: Vínculo jurídico em que o devedor deve uma prestação ao credor. Classes de obrigações (dar, fazer, não fazer), adimplemento, inadimplemento e a responsabilidade civil daí decorrente.
    subtopicos:
    - titulo: Modalidades e extinção
      texto: Obrigações solidárias, divisíveis/indivisíveis. Extinção por pagamento, compensação, novação, confusão, remissão e dação em pagamento.
    - titulo: Responsabilidade civil
      texto: Subjetiva (exige culpa) e objetiva (independe de culpa, baseada no risco). Pressupõe conduta, dano e nexo causal.
    prova:
    - 49
  - titulo: 5. Contratos
    explicacao: 'Acordo de vontades que cria, modifica ou extingue obrigações. Princípios: autonomia da vontade, boa-fé objetiva, função social do contrato e força obrigatória (pacta sunt servanda).'
    subtopicos:
    - titulo: Teoria geral e espécies
      texto: 'Formação, classificação e extinção dos contratos. Espécies típicas: compra e venda, prestação de serviços, locação, fiança, entre outras.'
    prova:
    - 50
  - titulo: 6. Direito de Empresa
    explicacao: Empresário é quem exerce profissionalmente atividade econômica organizada para a produção/circulação de bens ou serviços. Regula-se o registro, o nome, o estabelecimento e as sociedades.
    subtopicos:
    - titulo: Empresário e estabelecimento
      texto: Inscrição obrigatória no Registro Público de Empresas Mercantis; estabelecimento é o complexo de bens organizados; trespasse é sua transferência.
    - titulo: Sociedades
      texto: Personificadas e não personificadas; sociedade simples e empresária; tipos (limitada, anônima, em nome coletivo). A limitada é a mais comum no Brasil.
    - titulo: Falência e recuperação
      texto: Recuperação judicial/extrajudicial visa preservar a empresa viável; a falência liquida o patrimônio do insolvente. Lei 11.101/2005.
    prova:
    - 46
    - 47
    - 54
  - titulo: 7. Posse e direitos reais (noções)
    explicacao: Posse e sua proteção no Código Civil — base para questões de Direito das Coisas.
    subtopicos:
    - titulo: 'Posse: classificação e aquisição'
      texto: Posse direta/indireta; justa x injusta (violenta, clandestina, precária); detenção (arts. 1.198/1.208); aquisição por representante.
    prova:
    - 51
- slug: economia
  titulo: Economia
  grupo: Conhecimentos Básicos
  icone: 📈
  resumo: Microeconomia (oferta, demanda, mercados, tributação) e Macroeconomia (PIB, moeda, inflação, política fiscal e monetária).
  topicos:
  - titulo: 1. Conceitos fundamentais
    explicacao: 'Economia estuda a alocação de recursos escassos entre necessidades ilimitadas. Conceitos centrais: escassez, custo de oportunidade, fatores de produção e a curva de possibilidades de produção (CPP).'
    subtopicos:
    - titulo: Escassez e custo de oportunidade
      texto: Todo recurso tem usos alternativos; escolher um implica abrir mão de outro. A CPP ilustra o trade-off e a eficiência produtiva.
  - titulo: 2. Oferta, demanda e equilíbrio de mercado
    explicacao: A demanda relaciona preço e quantidade procurada (inversa); a oferta, preço e quantidade ofertada (direta). O equilíbrio ocorre onde as curvas se cruzam, definindo preço e quantidade de mercado.
    subtopicos:
    - titulo: Deslocamentos x movimentos
      texto: Variação de preço move-se ao longo da curva; mudanças em renda, gostos, preço de bens relacionados ou expectativas deslocam a curva inteira.
    - titulo: Bens substitutos e complementares
      texto: 'Substitutos: alta no preço de um eleva a demanda do outro. Complementares: alta no preço de um reduz a demanda do outro.'
    prova:
    - 60
  - titulo: 3. Elasticidades
    explicacao: Mede a sensibilidade da quantidade a variações de preço ou renda. Elasticidade-preço da demanda indica se a demanda é elástica (>1), inelástica (<1) ou unitária (=1) — crucial para política tributária.
    subtopicos:
    - titulo: Elasticidade e tributação
      texto: Quanto mais inelástica a demanda, maior a parcela do imposto repassada ao consumidor e maior a arrecadação com menor perda de bem-estar.
  - titulo: 4. Teoria da produção e custos
    explicacao: Relação entre insumos e produto (função de produção), produtividade marginal e lei dos rendimentos decrescentes. Custos fixos, variáveis, totais, médios e marginais.
    subtopicos:
    - titulo: Custos no curto e longo prazo
      texto: No curto prazo há fator fixo; no longo prazo todos variam, permitindo economias e deseconomias de escala.
    prova:
    - 58
  - titulo: 5. Estruturas de mercado
    explicacao: Concorrência perfeita (muitos agentes, produto homogêneo, preço dado), monopólio (um vendedor), oligopólio (poucos) e concorrência monopolística (diferenciação de produto).
    subtopicos:
    - titulo: Falhas de mercado
      texto: Externalidades, bens públicos, assimetria de informação e poder de mercado justificam a intervenção do Estado e a tributação corretiva.
    prova:
    - 57
    - 65
  - titulo: '6. Macroeconomia: contas nacionais'
    explicacao: 'Mensuração da atividade econômica: PIB pelas óticas da produção, da renda e da despesa. Diferença entre variáveis nominais e reais e o papel dos agregados macroeconômicos.'
    subtopicos:
    - titulo: PIB e agregados
      texto: PIB = C + I + G + (X − M). Identidades entre poupança e investimento; PIB nominal usa preços correntes, PIB real, preços constantes.
    prova:
    - 64
  - titulo: 7. Moeda, inflação e sistema financeiro
    explicacao: Funções da moeda, oferta monetária, criação de moeda pelos bancos e o papel do Banco Central. Inflação como elevação contínua do nível geral de preços.
    subtopicos:
    - titulo: Política monetária
      texto: 'Instrumentos: taxa de juros (Selic), depósito compulsório e operações de mercado aberto. Controlam liquidez e inflação.'
    - titulo: Inflação
      texto: Tipos (demanda, custos, inercial) e índices de preços. Afeta a arrecadação real e a correção monetária de tributos.
  - titulo: 8. Política fiscal e setor externo
    explicacao: Política fiscal usa receitas (tributos) e despesas públicas para influenciar a economia. O setor externo trata de balança comercial, câmbio e balanço de pagamentos.
    subtopicos:
    - titulo: Política fiscal
      texto: Expansionista (mais gasto/menos imposto) estimula a demanda; contracionista, o contrário. Relaciona-se diretamente ao orçamento e à tributação.
    prova:
    - 62
  - titulo: 9. Tributação ótima e classificação de tributos
    explicacao: 'Teoria da tributação: regra de Ramsey, second best e a tipologia dos tributos (direto/indireto, IVA).'
    subtopicos:
    - titulo: Regra de Ramsey e trade-off eficiência×equidade
      texto: Tributar mais o que tem demanda inelástica; second best; crítica distributiva.
    - titulo: Classificação dos tributos e o IVA
      texto: Direto x indireto; específico x ad valorem; monofásico x plurifásico; não cumulatividade e neutralidade do IVA.
    prova:
    - 56
    - 61
  - titulo: 10. Balanço de Pagamentos
    explicacao: 'Registro das transações de um país com o exterior: contas e saldos.'
    subtopicos:
    - titulo: Transações correntes e conta financeira
      texto: TC = balança comercial + serviços + rendas + transferências; Conta Capital; Conta Financeira (IDP, carteira, reservas).
    prova:
    - 59
  - titulo: 11. Modelo IS-LM
    explicacao: Equilíbrio conjunto dos mercados de bens (IS) e de moeda (LM) e a determinação de produto e juros.
    subtopicos:
    - titulo: Curva IS, curva LM e inclinação
      texto: 'IS: equilíbrio no mercado de bens (Y=C+I+G); LM: demanda por moeda = oferta; inclinações, multiplicador e deslocamentos.'
    prova:
    - 63
- slug: contabilidade-geral
  titulo: Contabilidade Geral
  grupo: Conhecimentos Básicos
  icone: 🧾
  resumo: Conceitos, princípios e normas contábeis (CPC), escrituração, demonstrações financeiras e análise de balanços.
  topicos:
  - titulo: 1. Conceitos e princípios contábeis
    explicacao: Contabilidade é o sistema de informação que registra os fatos patrimoniais e gera demonstrações para usuários. Baseia-se em princípios e na estrutura conceitual do CFC e dos Pronunciamentos do CPC.
    subtopicos:
    - titulo: Estrutura conceitual
      texto: 'Características qualitativas: relevância e representação fidedigna (fundamentais); comparabilidade, verificabilidade, tempestividade e compreensibilidade (de melhoria).'
    - titulo: Patrimônio
      texto: 'Ativo (bens e direitos), passivo (obrigações) e patrimônio líquido (capital próprio). Equação fundamental: Ativo = Passivo + PL.'
  - titulo: 2. Escrituração e o método das partidas dobradas
    explicacao: 'Registro contábil pelo método das partidas dobradas: para todo débito há um crédito de igual valor. Contas patrimoniais e de resultado, livros obrigatórios e plano de contas.'
    subtopicos:
    - titulo: Débito e crédito
      texto: Ativo e despesas aumentam a débito; passivo, PL e receitas aumentam a crédito. O razonete sintetiza a movimentação de cada conta.
    - titulo: Regime de competência
      texto: Receitas e despesas são reconhecidas no período em que ocorrem (fato gerador), independentemente do recebimento/pagamento (caixa).
  - titulo: 3. Operações com mercadorias e estoques
    explicacao: Apuração do custo das mercadorias vendidas (CMV), critérios de avaliação de estoques (PEPS, custo médio) e tratamento de tributos sobre compras e vendas.
    subtopicos:
    - titulo: CMV e avaliação de estoques
      texto: CMV = EI + Compras − EF. Métodos PEPS (primeiro que entra, primeiro que sai) e média ponderada afetam o resultado e os tributos.
    prova:
    - 68
    - 74
  - titulo: 4. Ativo imobilizado, intangível e depreciação
    explicacao: Reconhecimento e mensuração de ativos de longo prazo. Depreciação, amortização e exaustão distribuem o custo pela vida útil; teste de recuperabilidade (impairment) ajusta perdas.
    subtopicos:
    - titulo: Depreciação
      texto: Métodos linear (cotas constantes), soma dos dígitos e unidades produzidas. Reduz o ativo e gera despesa ao longo da vida útil do bem.
    prova:
    - 75
  - titulo: 5. Demonstrações financeiras
    explicacao: 'Conjunto exigido pela Lei 6.404/76 e CPCs: Balanço Patrimonial, DRE, DRA, DFC, DMPL e DVA, com notas explicativas. Cada uma evidencia um aspecto da situação econômico-financeira.'
    subtopicos:
    - titulo: Balanço Patrimonial e DRE
      texto: BP é estático (posição em uma data); DRE é dinâmica (resultado do período, do lucro bruto ao lucro líquido).
    - titulo: DFC e DVA
      texto: DFC mostra entradas/saídas de caixa (operacional, investimento, financiamento); DVA evidencia a riqueza gerada e sua distribuição.
    prova:
    - 69
    - 73
  - titulo: 6. Análise de balanços
    explicacao: Interpretação das demonstrações por meio de indicadores de liquidez, endividamento, rentabilidade e atividade, além das análises horizontal e vertical.
    subtopicos:
    - titulo: Índices
      texto: Liquidez (corrente, seca, geral), endividamento, rentabilidade (ROE, ROA, margens) e prazos médios. Avaliam capacidade de pagamento e desempenho.
  - titulo: 7. Provisões, passivos e ativos contingentes (CPC 25)
    explicacao: Reconhecimento e divulgação de obrigações e ativos incertos.
    subtopicos:
    - titulo: Provisão x contingência
      texto: Provisão só para perda provável e mensurável; passivo contingente (possível) apenas se divulga; ativo contingente não se reconhece.
    prova:
    - 71
    - 72
  - titulo: 8. Redução ao valor recuperável (CPC 01)
    explicacao: Teste de impairment de ativos, mensuração da perda e sua reversão.
    subtopicos:
    - titulo: Impairment e reversão
      texto: Valor recuperável = maior entre valor em uso e valor justo líquido; perda quando VC > recuperável; reversão limitada ao que existiria sem a perda.
    prova:
    - 70
  - titulo: 9. Mudança de estimativa e vida útil (CPC 23/CPC 27)
    explicacao: Revisão prospectiva de vida útil, valor residual e método de depreciação/amortização.
    subtopicos:
    - titulo: Revisão prospectiva de estimativas
      texto: Recalcula a depreciação sobre o valor contábil remanescente, sem retroagir; afeta o exercício atual e os futuros.
    prova:
    - 66
  - titulo: 10. Destinação do resultado e reservas (Lei 6.404/76)
    explicacao: 'Distribuição do lucro líquido: reservas e dividendo obrigatório.'
    subtopicos:
    - titulo: Reserva legal, estatutária e dividendo obrigatório
      texto: 'Reserva legal 5% (limite 20% do capital); dividendo obrigatório (ex.: 25% do lucro ajustado); reservas estatutária e de retenção de lucros.'
    prova:
    - 67
- slug: realidade-de-goias
  titulo: Realidade Étnica, Social, Histórica, Geográfica, Cultural, Política e Econômica de Goiás
  grupo: Conhecimentos Básicos
  icone: 🌳
  resumo: Formação, povoamento, geografia, sociedade, política, cultura e economia do Estado de Goiás.
  topicos:
  - titulo: 1. Formação econômica e povoamento
    explicacao: O ciclo da mineração do ouro no século XVIII impulsionou a ocupação de Goiás. Com a decadência aurífera, a economia voltou-se à pecuária e à agricultura de subsistência, marcando longa estagnação.
    subtopicos:
    - titulo: Ciclo do ouro e decadência
      texto: Bandeirantes fundaram arraiais mineradores; o esgotamento das jazidas levou ao isolamento e à transição para atividades agropastoris.
  - titulo: 2. Geografia de Goiás
    explicacao: Localização no Centro-Oeste, relevo de planaltos e chapadas, clima tropical com estações seca e chuvosa, e o bioma Cerrado predominante, com importante rede hidrográfica.
    subtopicos:
    - titulo: Cerrado e recursos naturais
      texto: O Cerrado, segundo maior bioma brasileiro, sustenta a expansão agrícola; nascentes goianas integram bacias do Araguaia/Tocantins e do Paraná.
  - titulo: 3. Sociedade e cultura
    explicacao: Diversidade étnica (indígenas, quilombolas como Kalunga, migrantes) e manifestações culturais como folias, congadas, a culinária e o patrimônio histórico das cidades coloniais.
    subtopicos:
    - titulo: Patrimônio e identidade
      texto: Cidade de Goiás (Patrimônio da Humanidade pela UNESCO), Pirenópolis e suas festas tradicionais expressam a cultura goiana.
  - titulo: 4. Política e modernização
    explicacao: A transferência da capital para Goiânia (planejada nos anos 1930) e a construção de Brasília reposicionaram Goiás, integrando-o à dinâmica nacional e acelerando a urbanização.
    subtopicos:
    - titulo: Goiânia e Brasília
      texto: A nova capital simbolizou a modernização; a interiorização promovida por Brasília dinamizou a economia e a infraestrutura regional.
    prova:
    - 76
    - 79
  - titulo: 5. Economia contemporânea
    explicacao: Agronegócio (grãos, carne), agroindústria, mineração, energia e serviços compõem a economia goiana, com forte inserção no comércio exterior e atração de investimentos.
    subtopicos:
    - titulo: Agronegócio e indústria
      texto: Goiás é grande produtor de soja, milho, cana e proteína animal; a agroindústria e a logística reforçam sua relevância econômica e fiscal.
    prova:
    - 80
  - titulo: 6. Geomorfologia e relevo de Goiás
    explicacao: 'Compartimentação do relevo goiano: planaltos, chapadões, cuestas e depressões.'
    subtopicos:
    - titulo: Subunidades geomorfológicas
      texto: Planalto Central; Planalto do Rio Verde; Cuesta do Caiapó; Planaltos do Distrito Federal; Depressão do Araguaia; Planície do Bananal.
    prova:
    - 78
  - titulo: 7. Fases da economia goiana
    explicacao: Periodização econômica de Goiás, da mineração à agroindústria com incentivos.
    subtopicos:
    - titulo: Da mineração à agroindustrialização
      texto: 1) ouro (séc. XVIII); 2) pecuária/subsistência; 3) agricultura (Marcha para o Oeste, ferrovia, soja/Embrapa); 4) agroindústria com FOMENTAR/PRODUZIR (1980-90).
    prova:
    - 77
- slug: tecnologia-da-informacao
  titulo: Tecnologias da Informação
  grupo: Conhecimentos Específicos
  icone: 💻
  resumo: Banco de dados, administração de dados, BI, mineração de dados e introdução à ciência de dados aplicadas à fiscalização.
  topicos:
  - titulo: 1. Fundamentos de banco de dados
    explicacao: Banco de dados é uma coleção organizada de dados; o SGBD (Sistema Gerenciador) controla armazenamento, acesso e integridade. O modelo relacional organiza dados em tabelas (relações) com chaves.
    subtopicos:
    - titulo: Modelo relacional e chaves
      texto: Tabelas, atributos e tuplas; chave primária identifica unicamente um registro; chave estrangeira referencia outra tabela, garantindo integridade referencial.
    - titulo: Linguagens (SQL)
      texto: 'DDL (definição: CREATE, ALTER), DML (manipulação: SELECT, INSERT, UPDATE, DELETE) e DCL (controle de acesso). SQL é a base da consulta a dados fiscais.'
    - titulo: Normalização
      texto: Processo de organizar tabelas para reduzir redundância e anomalias (1FN, 2FN, 3FN). Equilibra integridade e desempenho das consultas.
  - titulo: 2. Administração de dados
    explicacao: 'Gestão do dado como ativo organizacional: integridade, segurança, disponibilidade e desempenho. Inclui backup, recuperação, controle de acesso e tuning de banco de dados.'
    subtopicos:
    - titulo: Integridade e segurança
      texto: Controle de transações (propriedades ACID), níveis de isolamento, autenticação e autorização. Protege dados sigilosos do contribuinte.
    - titulo: Backup e recuperação
      texto: Estratégias de cópia (completo, incremental, diferencial) e planos de recuperação garantem continuidade e auditabilidade dos dados fiscais.
  - titulo: 3. Modelagem multidimensional e Data Warehouse
    explicacao: Para análise, dados operacionais são integrados em um Data Warehouse (DW), modelado de forma multidimensional (esquema estrela/floco de neve) com fatos e dimensões, suportando OLAP.
    subtopicos:
    - titulo: Esquema estrela e OLAP
      texto: Tabela-fato (métricas) cercada por dimensões; OLAP permite slice, dice, drill-down e roll-up para analisar grandes volumes.
    - titulo: ETL
      texto: 'Extração, Transformação e Carga: integra fontes heterogêneas, limpa e padroniza dados antes da carga no DW.'
  - titulo: 4. Business Intelligence (BI)
    explicacao: 'Conjunto de técnicas para transformar dados em informação de apoio à decisão: dashboards, KPIs, relatórios e análises que orientam a inteligência fiscal.'
    subtopicos:
    - titulo: Indicadores e visualização
      texto: KPIs (indicadores-chave), painéis interativos e relatórios apoiam o monitoramento de arrecadação e a seleção de contribuintes para fiscalização.
  - titulo: 5. Mineração de dados (Data Mining)
    explicacao: 'Descoberta de padrões úteis em grandes bases. Tarefas principais: classificação, regressão, agrupamento (clustering), associação e detecção de anomalias — essenciais para identificar sonegação.'
    subtopicos:
    - titulo: Tarefas de mineração
      texto: 'Classificação prevê categorias (ex.: sonegador/não); clustering agrupa por semelhança; associação descobre regras (cesta de compras); anomalias revelam fraudes.'
    - titulo: Avaliação de modelos
      texto: Métricas como acurácia, precisão, recall, matriz de confusão e curva ROC medem a qualidade dos modelos preditivos.
  - titulo: 6. Introdução à ciência de dados
    explicacao: Combina estatística, computação e conhecimento de negócio para extrair valor dos dados, com aprendizado de máquina supervisionado e não supervisionado.
    subtopicos:
    - titulo: Aprendizado de máquina
      texto: Supervisionado (regressão, árvores de decisão, redes neurais, SVM) usa dados rotulados; não supervisionado (k-means, PCA) descobre estrutura oculta.
    - titulo: Big Data e fluxos
      texto: Tratamento de grandes volumes e dados em tempo real; mineração de fluxos e séries temporais apoiam previsão e detecção precoce de irregularidades.
- slug: auditoria
  titulo: Auditoria
  grupo: Conhecimentos Específicos
  icone: 🔍
  resumo: Planejamento, risco, evidência, procedimentos, controles internos, amostragem, relatórios e parecer.
  topicos:
  - titulo: 1. Planejamento de auditoria
    explicacao: Etapa inicial que define objetivos, natureza, época e extensão dos exames. Considera o conhecimento do negócio, os riscos e a materialidade para direcionar os esforços.
    subtopicos:
    - titulo: Materialidade
      texto: 'Patamar de relevância: distorções acima dele influenciam decisões dos usuários. Orienta a profundidade e a seleção de itens a examinar.'
  - titulo: 2. Risco de auditoria
    explicacao: Probabilidade de o auditor emitir opinião inadequada. Decompõe-se em risco inerente, risco de controle e risco de detecção. Quanto maior o risco, maior a extensão dos procedimentos.
    subtopicos:
    - titulo: Componentes do risco
      texto: Inerente (suscetibilidade natural a erro), de controle (falha dos controles internos) e de detecção (procedimentos não detectarem a distorção).
  - titulo: 3. Controles internos
    explicacao: Conjunto de políticas e procedimentos que garantem confiabilidade da informação, eficiência operacional e conformidade. Avaliar controles permite reduzir testes substantivos.
    subtopicos:
    - titulo: Componentes (COSO)
      texto: Ambiente de controle, avaliação de riscos, atividades de controle, informação/comunicação e monitoramento. Segregação de funções é controle-chave.
  - titulo: 4. Evidência e procedimentos de auditoria
    explicacao: A evidência fundamenta a opinião do auditor e deve ser suficiente e adequada. Obtém-se por inspeção, observação, indagação, confirmação, recálculo, reexecução e procedimentos analíticos.
    subtopicos:
    - titulo: Tipos de procedimentos
      texto: Testes de observância (verificam controles) e testes substantivos (de transações e de saldos) detectam distorções relevantes.
    - titulo: Procedimentos analíticos
      texto: Comparações e análises de relações entre dados (índices, tendências) para identificar variações incomuns que mereçam investigação.
  - titulo: 5. Amostragem em auditoria
    explicacao: Aplicação de procedimentos a menos de 100% dos itens, permitindo concluir sobre toda a população. Pode ser estatística (probabilística) ou não estatística (baseada no julgamento).
    subtopicos:
    - titulo: Métodos de seleção
      texto: Aleatória, sistemática e por unidade monetária. O risco de amostragem é a chance de a amostra não representar a população.
  - titulo: 6. Relatórios e parecer de auditoria
    explicacao: Comunicação do resultado dos trabalhos. A opinião pode ser não modificada (sem ressalva) ou modificada (com ressalva, adversa ou abstenção), conforme as distorções encontradas.
    subtopicos:
    - titulo: Tipos de opinião
      texto: Sem ressalva (demonstrações fidedignas); com ressalva (distorção relevante mas não generalizada); adversa (relevante e generalizada); abstenção (impossibilidade de obter evidência).
- slug: contabilidade-avancada-custos
  titulo: Contabilidade Avançada e de Custos
  grupo: Conhecimentos Específicos
  icone: 📐
  resumo: Investimentos, consolidação, combinação de negócios, tributos diferidos e a contabilidade de custos para decisão.
  topicos:
  - titulo: '1. Contabilidade avançada: investimentos societários'
    explicacao: Avaliação de participações em outras empresas. Coligadas e controladas com influência significativa usam o método de equivalência patrimonial (MEP); demais, o custo ou valor justo.
    subtopicos:
    - titulo: Método de equivalência patrimonial
      texto: A investidora reconhece sua parte no resultado e no PL da investida. Ajusta o valor contábil do investimento conforme o desempenho da participada.
  - titulo: 2. Combinação de negócios e consolidação
    explicacao: Aquisição do controle de um negócio (método de aquisição) gera goodwill (ágio por rentabilidade futura). A consolidação reúne as demonstrações da controladora e controladas como entidade única.
    subtopicos:
    - titulo: Goodwill e mais/menos-valia
      texto: Diferença entre o valor pago e o valor justo dos ativos líquidos; goodwill é testado por impairment e não amortizado.
    - titulo: Consolidação
      texto: Soma-se ativo, passivo, receitas e despesas, eliminando-se transações e saldos intragrupo e destacando a participação de não controladores.
  - titulo: 3. Reorganização societária e tributos diferidos
    explicacao: Fusão, incorporação e cisão alteram a estrutura das sociedades. Diferenças temporárias entre o lucro contábil e o fiscal geram ativos e passivos fiscais diferidos.
    subtopicos:
    - titulo: Tributos diferidos
      texto: Diferenças temporárias dedutíveis geram ativo fiscal diferido; tributáveis geram passivo. Refletem o efeito futuro de IRPJ/CSLL.
  - titulo: '4. Custos: conceitos e classificação'
    explicacao: Custo é o gasto com bens/serviços na produção; despesa é o gasto para gerar receita fora da produção. Classificam-se em diretos/indiretos e fixos/variáveis.
    subtopicos:
    - titulo: Terminologia
      texto: Gasto, custo, despesa, investimento, perda e desembolso. Diretos são apropriados diretamente; indiretos exigem rateio (CIF).
    - titulo: Fixos e variáveis
      texto: Fixos independem do volume (aluguel da fábrica); variáveis acompanham a produção (matéria-prima). Base da análise custo-volume-lucro.
  - titulo: 5. Métodos de custeio
    explicacao: 'Formas de apropriar custos aos produtos: custeio por absorção (legal e fiscal, inclui custos fixos), variável (apenas variáveis, gerencial) e baseado em atividades (ABC).'
    subtopicos:
    - titulo: Absorção x variável
      texto: Absorção é exigido pela legislação societária e fiscal; o variável apoia decisões gerenciais por isolar a margem de contribuição.
    - titulo: Custeio ABC
      texto: Aloca custos indiretos a partir das atividades e seus direcionadores, aprimorando a precisão em estruturas complexas.
  - titulo: 6. Análise custo-volume-lucro
    explicacao: Margem de contribuição (receita − custos/despesas variáveis), ponto de equilíbrio (onde a margem cobre os custos fixos) e alavancagem operacional apoiam decisões de preço e produção.
    subtopicos:
    - titulo: Ponto de equilíbrio
      texto: Contábil, econômico e financeiro. Indica o volume mínimo de vendas para não ter prejuízo; abaixo dele há perda, acima, lucro.
- slug: direito-tributario-1
  titulo: Direito Tributário I
  grupo: Conhecimentos Específicos
  icone: 📚
  resumo: Sistema Tributário Nacional, princípios, competência, espécies tributárias, obrigação, crédito e Código Tributário Nacional.
  topicos:
  - titulo: 1. Sistema Tributário Nacional
    explicacao: Conjunto de normas constitucionais e legais que regem a tributação. A CF distribui competências e estabelece limites; o CTN (Lei 5.172/66) traz as normas gerais com status de lei complementar.
    subtopicos:
    - titulo: Princípios constitucionais tributários
      texto: Legalidade, isonomia, irretroatividade, anterioridade (anual e nonagesimal), vedação ao confisco, capacidade contributiva e uniformidade geográfica.
    - titulo: Imunidades
      texto: 'Limitações constitucionais ao poder de tributar: recíproca entre entes, templos, partidos, sindicatos, entidades sem fins lucrativos, livros e jornais.'
  - titulo: 2. Espécies tributárias e competência
    explicacao: Tributos são impostos, taxas, contribuições de melhoria, empréstimos compulsórios e contribuições especiais. A competência (poder de instituir) é indelegável e privativa de cada ente.
    subtopicos:
    - titulo: Espécies de tributos
      texto: Impostos (não vinculados), taxas (serviço/poder de polícia), contribuição de melhoria (valorização imobiliária), empréstimos compulsórios e contribuições especiais.
    - titulo: Competência tributária
      texto: Privativa, comum, residual e extraordinária. A capacidade tributária ativa (arrecadar/fiscalizar) pode ser delegada; a competência, não.
  - titulo: 3. Obrigação tributária
    explicacao: Vínculo entre Fisco e contribuinte. A obrigação principal (pagar tributo/penalidade) surge com o fato gerador; a acessória impõe deveres instrumentais (escriturar, declarar, emitir nota).
    subtopicos:
    - titulo: Fato gerador e hipótese de incidência
      texto: A hipótese de incidência é a previsão abstrata na lei; o fato gerador é sua concretização, que faz nascer a obrigação.
    - titulo: Sujeitos e responsabilidade
      texto: Sujeito ativo (credor) e passivo (contribuinte ou responsável). Responsabilidade por substituição, transferência, sucessão e de terceiros.
  - titulo: 4. Crédito tributário
    explicacao: É a obrigação tributária tornada líquida e exigível pelo lançamento. O lançamento pode ser de ofício, por declaração ou por homologação, conforme a participação do sujeito passivo.
    subtopicos:
    - titulo: Lançamento
      texto: 'De ofício (Fisco apura tudo, ex.: IPTU), por declaração (mista) e por homologação (contribuinte calcula e antecipa, ex.: ICMS). Vincula a atividade administrativa.'
    - titulo: Suspensão, extinção e exclusão
      texto: Suspensão (moratória, parcelamento, liminar); extinção (pagamento, compensação, prescrição, decadência); exclusão (isenção e anistia).
  - titulo: 5. Garantias, privilégios e administração tributária
    explicacao: O crédito tributário goza de garantias e preferências na cobrança. A administração tributária abrange fiscalização, dívida ativa e certidões, com poderes e deveres definidos no CTN.
    subtopicos:
    - titulo: Dívida ativa e CDA
      texto: Crédito não pago é inscrito em dívida ativa, gerando a Certidão de Dívida Ativa (CDA), título executivo que embasa a execução fiscal.
    - titulo: Fiscalização e sigilo
      texto: Poderes de fiscalização, dever de informação de terceiros e proteção ao sigilo fiscal, com exceções legais para troca de informações.
- slug: direito-tributario-2-reforma
  titulo: Direito Tributário II — Reforma Tributária
  grupo: Conhecimentos Específicos
  icone: 🔄
  resumo: EC 132/2023, IBS, CBS, Imposto Seletivo, transição, comitê gestor e o novo modelo de tributação sobre o consumo.
  topicos:
  - titulo: 1. EC 132/2023 e o novo modelo
    explicacao: 'A Emenda Constitucional 132/2023 instituiu a reforma da tributação sobre o consumo, substituindo cinco tributos (ICMS, ISS, IPI, PIS e Cofins) por um modelo de IVA dual: IBS, CBS e o Imposto Seletivo.'
    subtopicos:
    - titulo: Princípios da reforma
      texto: Simplicidade, transparência, neutralidade, justiça tributária, cooperação e defesa do meio ambiente. Tributação no destino, não na origem.
    - titulo: IVA dual
      texto: 'Modelo com dois tributos sobre valor agregado: a CBS (federal) e o IBS (estadual/municipal compartilhado), além do Imposto Seletivo.'
  - titulo: 2. IBS — Imposto sobre Bens e Serviços
    explicacao: Tributo de competência compartilhada entre Estados, DF e Municípios, que substitui o ICMS e o ISS. Incide de forma ampla sobre operações com bens materiais/imateriais e serviços, com não cumulatividade plena.
    subtopicos:
    - titulo: Características do IBS
      texto: Base ampla, alíquota única por ente (com possibilidade de alíquota de referência), cobrança no destino e crédito amplo (não cumulatividade plena).
    - titulo: Não cumulatividade plena
      texto: Garante crédito sobre praticamente todas as aquisições, eliminando o efeito cascata e desonerando exportações e investimentos.
  - titulo: 3. CBS — Contribuição sobre Bens e Serviços
    explicacao: Contribuição federal que substitui PIS e Cofins (e parte do IPI), com a mesma base e regras do IBS, formando o IVA dual. Visa simplificar e dar neutralidade à tributação federal do consumo.
    subtopicos:
    - titulo: Harmonização com o IBS
      texto: CBS e IBS partilham fato gerador, base de cálculo e regras gerais, facilitando o cumprimento das obrigações pelo contribuinte.
  - titulo: 4. Imposto Seletivo
    explicacao: Imposto federal extrafiscal ('imposto do pecado') sobre a produção, extração, comercialização ou importação de bens e serviços prejudiciais à saúde ou ao meio ambiente.
    subtopicos:
    - titulo: Finalidade extrafiscal
      texto: Desestimula o consumo de produtos nocivos (tabaco, bebidas, alguns combustíveis). Não incide sobre exportações nem sobre bens essenciais.
  - titulo: 5. Regimes específicos e diferenciados
    explicacao: A reforma prevê tratamentos próprios para setores específicos (combustíveis, financeiro, imóveis, saúde, educação, agronegócio, Simples Nacional) e regimes diferenciados com redução de alíquota ou cashback.
    subtopicos:
    - titulo: Cesta básica e cashback
      texto: Cesta básica nacional com alíquota zero; mecanismo de devolução (cashback) de tributo a famílias de baixa renda para reduzir a regressividade.
  - titulo: 6. Transição e governança federativa
    explicacao: A migração para o novo sistema é gradual (período de transição até 2033) e a gestão do IBS cabe ao Comitê Gestor, com Fundos de compensação para mitigar perdas de arrecadação dos entes.
    subtopicos:
    - titulo: Período de transição
      texto: Convivência temporária entre tributos antigos e novos (alíquotas-teste a partir de 2026), com extinção progressiva de ICMS/ISS até 2033.
    - titulo: Comitê Gestor do IBS
      texto: Entidade pública que centraliza arrecadação, distribuição e regulamentação do IBS entre Estados, DF e Municípios, assegurando uniformidade.
- slug: legislacao-tributaria
  titulo: Legislação Tributária (Estado de Goiás)
  grupo: Conhecimentos Específicos
  icone: 🏷️
  resumo: ICMS, ITCD, IPVA e taxas estaduais conforme o Código Tributário de Goiás e legislação correlata.
  topicos:
  - titulo: 1. Código Tributário do Estado de Goiás
    explicacao: A Lei 11.651/1991 institui o Código Tributário Estadual (CTE-GO), que disciplina os tributos de competência de Goiás, as obrigações, o lançamento, o contencioso e as penalidades.
    subtopicos:
    - titulo: Estrutura do CTE-GO
      texto: Disposições gerais, normas sobre cada tributo estadual, obrigações acessórias, infrações e penalidades e o processo administrativo tributário.
  - titulo: 2. ICMS — incidência e fato gerador
    explicacao: Principal tributo estadual, incide sobre circulação de mercadorias, prestação de serviços de transporte interestadual/intermunicipal e de comunicação, além de importação. Não cumulativo e seletivo.
    subtopicos:
    - titulo: Hipóteses de incidência
      texto: Saída de mercadoria, importação, serviços de transporte e comunicação, fornecimento de energia e de mercadoria com serviço não tributado pelo ISS.
    - titulo: Não cumulatividade
      texto: Compensa-se o imposto devido com o cobrado nas operações anteriores (crédito), evitando a tributação em cascata ao longo da cadeia.
  - titulo: 3. ICMS — base de cálculo, alíquotas e substituição tributária
    explicacao: A base é o valor da operação; as alíquotas variam por produto (seletividade) e por operação (interna/interestadual). A substituição tributária concentra o recolhimento em um responsável.
    subtopicos:
    - titulo: Alíquotas internas e interestaduais
      texto: Operações internas seguem a alíquota do Estado; interestaduais usam alíquotas fixadas pelo Senado, com partilha do diferencial (DIFAL) ao destino.
    - titulo: Substituição tributária (ST)
      texto: Antecipa-se o ICMS de toda a cadeia por meio de um substituto (geralmente o fabricante/importador), simplificando a fiscalização.
  - titulo: 4. ICMS — benefícios fiscais e documentos
    explicacao: Isenções, reduções de base e créditos outorgados dependem de convênios no CONFAZ. Obrigações acessórias incluem a emissão de documentos fiscais eletrônicos (NF-e, CT-e) e a EFD.
    subtopicos:
    - titulo: Convênios CONFAZ
      texto: Benefícios de ICMS exigem deliberação unânime dos Estados via convênio, para evitar a guerra fiscal entre as unidades federadas.
    - titulo: Documentos fiscais eletrônicos
      texto: NF-e, NFC-e, CT-e e a Escrituração Fiscal Digital (EFD) integram o SPED e instrumentalizam a fiscalização eletrônica.
  - titulo: 5. ITCD — Transmissão Causa Mortis e Doação
    explicacao: Imposto estadual sobre transmissão gratuita de bens e direitos por herança/legado (causa mortis) ou doação. Em Goiás é regido pelo CTE-GO e legislação específica.
    subtopicos:
    - titulo: Incidência e base
      texto: Incide sobre o valor venal dos bens transmitidos gratuitamente. O contribuinte é o herdeiro, legatário ou donatário, conforme o caso.
  - titulo: 6. IPVA — Propriedade de Veículos Automotores
    explicacao: Imposto estadual anual sobre a propriedade de veículos automotores. Fato gerador é a propriedade; base é o valor venal; alíquotas variam por tipo de veículo.
    subtopicos:
    - titulo: Fato gerador e repartição
      texto: Ocorre anualmente (e na primeira aquisição/importação). 50% da arrecadação pertence ao município de licenciamento do veículo.
  - titulo: 7. Taxas estaduais e legislação correlata
    explicacao: Taxas pelo exercício do poder de polícia e pela prestação de serviços públicos específicos e divisíveis, além de leis, decretos e instruções normativas que regulamentam a legislação tributária goiana.
    subtopicos:
    - titulo: Hierarquia normativa
      texto: Constituição, leis complementares e ordinárias, decretos (RICMS), instruções normativas e atos do CONFAZ compõem a legislação tributária aplicável.
- slug: direito-penal
  titulo: Direito Penal
  grupo: Conhecimentos Básicos
  icone: 🚔
  resumo: Crimes contra a Administração e as finanças públicas, abuso de autoridade e corrupção — recorte fiscal.
  topicos:
  - titulo: 1. Crimes contra a Administração Pública
    explicacao: Tipos penais praticados por funcionário público ou contra a Administração.
    subtopicos:
    - titulo: Corrupção passiva e ativa (arts. 317 e 333)
      texto: Solicitar/receber vantagem (passiva, servidor) x oferecer (ativa, particular); concussão (316) e peculato (312).
