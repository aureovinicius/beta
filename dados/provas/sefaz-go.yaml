  21:
    enunciado: "À luz da Constituição Federal e da jurisprudência do STF, lei estadual que estabeleça a exigência de depósito prévio para admissibilidade de recurso administrativo, no âmbito do processo administrativo estadual, será inconstitucional"
    alternativas:
      - "formalmente, por ofensa a competência legislativa privativa da União, cabendo ser objeto de ação direta de inconstitucionalidade perante o STF, mas não perante o Tribunal de Justiça do Estado respectivo."
      - "materialmente, por ofensa a normas definidoras de direitos e garantias fundamentais, cabendo ser objeto de reclamação perante o STF, por ofensa a súmula vinculante."
      - "materialmente, por ofensa a normas definidoras de direitos e garantias fundamentais, cabendo ser objeto de ação direta de inconstitucionalidade, seja perante o STF ou perante o Tribunal de Justiça do Estado respectivo."
      - "material e formalmente, cabendo ser objeto de arguição de descumprimento de preceito fundamental perante o STF."
      - "formalmente, por ofensa a competência legislativa privativa da União, cabendo ser objeto de reclamação perante o STF, por ofensa a súmula vinculante."
  22:
    enunciado: "[Trechos de voto do Relator em ADPFs contra lei do Estado de São Paulo que estabelece diretrizes para prorrogação e relicitação de contratos de parceria, julgadas improcedentes] À luz da Constituição Federal e da jurisprudência do STF, as referidas ações foram propostas contra lei considerada"
    alternativas:
      - "constitucional, por se tratar de exercício regular de competência própria do Estado, em matéria de competência legislativa concorrente, em relação à qual cabe à União editar normas gerais."
      - "constitucional, por se tratar de exercício regular de competência suplementar do Município para legislar com vistas a atender ao interesse local, de modo compatível com as normas gerais editadas pela União."
      - "inconstitucional, por se tratar de exercício irregular de competência suplementar de ente subnacional, em matéria de competência legislativa concorrente, em relação à qual cabe à União editar normas gerais."
      - "constitucional, por se tratar de exercício regular de competência suplementar do Estado para legislar com vistas a atender a suas peculiaridades, de modo compatível com as normas gerais editadas pela União."
      - "constitucional, por se tratar de exercício regular de competência própria do Município para editar normas gerais, que atendam ao interesse local, ainda que inexistentes normas federais ou estaduais sobre a matéria."
  23:
    enunciado: "Ao dispor sobre a fiscalização contábil, financeira e orçamentária do Estado de Goiás, a Constituição estadual estabelece que"
    alternativas:
      - "compete ao Tribunal de Contas do Estado julgar as contas anuais prestadas pelo Tribunal de Contas dos Municípios, pelo Governador do Estado e as dos administradores e demais responsáveis por dinheiros, bens e valores públicos na administração estadual."
      - "cabe à Assembleia Legislativa, com a sanção do Governador, autorizar o Estado a contrair empréstimos internos e externos, bem como conceder garantias do Tesouro Estadual em operações de crédito."
      - "a Comissão parlamentar permanente encarregada do acompanhamento e fiscalização orçamentária, diante de indícios de despesas não autorizadas, poderá solicitar esclarecimentos à autoridade responsável e, caso haja risco de grave lesão à economia pública, determinar a sustação da despesa."
      - "os responsáveis pelo controle interno, ao tomarem conhecimento de qualquer irregularidade ou ilegalidade, dela darão ciência ao Tribunal de Contas do Estado, sob pena de responsabilidade solidária, nos mesmos moldes estabelecidos pela Constituição Federal no âmbito federal."
      - "os Poderes Executivo, Legislativo e Judiciário manterão, de forma integrada, um sistema permanente de monitoramento e avaliação de políticas públicas, cujo órgão central é o Tribunal de Contas do Estado."
  24:
    enunciado: "Considera-se mecanismo de controle político de constitucionalidade, previsto na Constituição do Estado de Goiás, a"
    alternativas:
      - "sustação, pela Assembleia Legislativa, dos atos normativos do Poder Executivo em desacordo com a lei ou que exorbitem do poder regulamentar ou dos limites de delegação legislativa."
      - "emissão de parecer, por Comissão especial da Assembleia Legislativa, sobre a admissibilidade de medidas provisórias editadas pelo Governador do Estado, previamente à deliberação legislativa."
      - "apreciação, pelo Tribunal de Contas do Estado, para fins de registro, dos atos de admissão de pessoal, a qualquer título, na administração direta e indireta, excetuadas as nomeações para cargo de provimento em comissão."
      - "oposição de veto, pelo Governador do Estado, a projeto de lei aprovado pela Assembleia Legislativa, no prazo de quinze dias úteis contados do recebimento, por considerá-lo no todo ou em parte inconstitucional."
      - "sustação, pela Assembleia Legislativa, do andamento de ação penal instaurada pelo Tribunal de Justiça contra Deputado Estadual, por crime ocorrido após a diplomação."
  25:
    enunciado: "[Trecho de ementa do STF sobre direito que oportuniza ao cidadão ser cointérprete da Constituição e realizar atos de protesto eventualmente inconvenientes aos não-participantes] À luz da disciplina constitucional dos direitos e garantias fundamentais, o acórdão refere-se à liberdade de"
    alternativas:
      - "opinião."
      - "reunião."
      - "associação."
      - "locomoção."
      - "expressão do pensamento."
  26:
    enunciado: "Certo partido político, com representação na Câmara Municipal, pretende ajuizar ação direta de inconstitucionalidade perante o Tribunal de Justiça do Estado, em face de lei de Município goiano que proíbe o corte no fornecimento de energia elétrica e água com menos de 60 dias de atraso do pagamento, por entender que a norma viola competências da União. Nos termos da Constituição Federal, da Constituição do Estado de Goiás e da jurisprudência do STF, a ação direta seria, em tese,"
    alternativas:
      - "incabível, caso o partido político não possua representação no Congresso Nacional, pois não estará legitimado para a propositura da ação."
      - "incabível, uma vez que o Tribunal de Justiça não possui competência para o julgamento da matéria, que envolve violação à Constituição Federal, e não à Constituição estadual."
      - "cabível, embora, no mérito, a inconstitucionalidade da lei municipal seja parcial, apenas por violação às competências administrativa e legislativa da União em matéria de energia elétrica."
      - "cabível, embora, no mérito, a inconstitucionalidade da lei municipal seja parcial, apenas por violação às competências administrativa e legislativa da União em matéria de águas."
      - "cabível, ademais de, no mérito, a lei municipal ser integralmente inconstitucional, por violação às competências administrativas e legislativas da União em matéria de energia elétrica e águas."
  27:
    enunciado: "Dois irmãos gêmeos, com 29 anos, sendo um membro do Ministério Público Federal e solteiro, e a outra servidora pública ocupante de cargo efetivo em administração estadual e casada com um Prefeito no exercício de seu segundo mandato, foram convidados a se filiarem a partido e concorrerem a vagas na Assembleia Legislativa do Estado em que residem. Considerando que ambos pretendem manter os cargos atuais, nos termos da Constituição Federal e da jurisprudência do STF,"
    alternativas:
      - "ambos poderão se filiar e se candidatar ao mandato pretendido, embora ele precise se licenciar do exercício do cargo até seis meses antes do pleito; se eleito, ficará afastado do cargo, sendo-lhe facultado optar pela sua remuneração."
      - "ambos poderão se filiar, mas nenhum poderá se candidatar ao mandato pretendido, pois, embora tenham domicílio e idade mínima exigida, são inelegíveis, como cônjuge e parente por afinidade de segundo grau de chefe de Poder Executivo."
      - "apenas ela poderá se filiar e se candidatar ao mandato pretendido; se eleita, ficará afastada do cargo efetivo e seu tempo de serviço será contado para todos os efeitos legais, exceto para promoção por merecimento."
      - "apenas ela poderá se filiar e se candidatar ao mandato pretendido; se eleita, havendo compatibilidade de horários, perceberá as vantagens de seu cargo efetivo, sem prejuízo da remuneração do cargo eletivo, e, não havendo compatibilidade, será afastada do cargo efetivo."
      - "ambos poderão se filiar, mas apenas ela poderá se candidatar ao mandato pretendido; se eleita, ficará afastada do cargo efetivo e, se for segurada de regime próprio de previdência social, permanecerá filiada a esse regime, no ente federativo de origem."
  28:
    enunciado: "Nos termos da Constituição Federal e da jurisprudência do STF, tanto o cidadão está legitimado para ajuizar ação popular, quanto o Ministério Público tem legitimidade para ajuizar ação civil pública, quando visarem a"
    alternativas:
      - "discutir o domínio de bem expropriado, desde que não tenha ocorrido ainda o trânsito em julgado de sentença condenatória proferida em sede de ação desapropriatória."
      - "declarar a nulidade de ato lesivo à moralidade administrativa, sob o fundamento de inconstitucionalidade, desde que haja comprovação de prejuízo ao erário público."
      - "executar decisões de condenação patrimonial proferidas pelos Tribunais de Contas."
      - "deduzir pretensão relativa à matéria tributária."
      - "anular atos administrativos de aposentadoria de servidores públicos que importem lesão ao patrimônio público."
  29:
    enunciado: "Considere as situações hipotéticas: (I) Projeto de lei ordinária, de matéria sujeita à iniciativa privativa do Governador e para a qual não se exige lei complementar, é transformado em projeto de lei complementar por emenda parlamentar, mantido o teor do projeto inicial. (II) Projeto de lei, de iniciativa parlamentar, determina que sejam transmitidas ao vivo, pela internet, as licitações realizadas pelo Poder Executivo estadual. Diante da disciplina constitucional do processo legislativo e da jurisprudência do STF,"
    alternativas:
      - "apenas a situação I é incompatível com a Constituição Federal, por extrapolação do poder de emenda parlamentar em matéria de iniciativa privativa do chefe do Executivo."
      - "ambas as situações são compatíveis com a Constituição Federal."
      - "apenas a situação II é incompatível com a Constituição Federal, por usurpar iniciativa privativa do chefe do Executivo."
      - "ambas as situações serão compatíveis com a Constituição Federal, desde que, se aprovados, os projetos sejam expressamente sancionados pelo Governador, sanando eventuais vícios de iniciativa ou de extrapolação do poder de emenda parlamentar."
      - "ambas as situações são incompatíveis com a Constituição Federal."
  30:
    enunciado: "Ao dispor sobre o Fundo de Estabilização Econômica do Estado de Goiás (FEG), a Constituição estadual estabelece que: (I) o FEG é fundo especial de natureza financeira e contábil, utilizável como reserva estratégica para estabilização fiscal, poupança intergeracional e mitigação de riscos fiscais; (II) sua administração, vinculada à Secretaria de Estado da Economia, dar-se-á por unidade orçamentária específica e observará as melhores práticas internacionais, inclusive os Princípios de Santiago; (III) a reserva mínima equivalerá a percentual do PIB do Estado a ser especificado em lei complementar, que regulamentará a origem dos recursos e suas regras de aplicação; (IV) o resgate de recursos pelo Governo dependerá de o valor do FEG estar acima do limite inferior estabelecido em lei, exceto quando sujeito a parâmetros estimados no Resultado Fiscal Estrutural (RFE). Está correto o que se afirma APENAS em"
    alternativas:
      - "I, II e III."
      - "III e IV."
