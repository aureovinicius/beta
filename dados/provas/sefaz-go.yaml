banca: FCC
titulo: "Prova FCC — Auditor-Fiscal SEFAZ-GO (Maio/2026) · Conhecimentos Básicos"
questoes:
  1:
    enunciado: "[Com base no texto 'O devaneio é uma doença?', de Contardo Calligaris] No último parágrafo, o autor admite que:"
    alternativas:
      - "a condenação social do devaneio é, infelizmente, a única alternativa para evitar as ilusórias vantagens da imaginação."
      - "é estranho haver quem considere a realidade um transtorno do qual só se pode escapar por meio dos devaneios."
      - "a possibilidade de devanear, vista por alguns como um transtorno mental, é preferível à renúncia de inventarmos nossos sonhos."
      - "o século XIX alimentou a crença de que os devaneios não poderiam ser vistos como limitações da nossa subjetividade."
      - "é o afastamento mesmo da realidade que leva um sonhador a negar-se a si mesmo como um sujeito autêntico."
  2:
    enunciado: "[Texto 'O devaneio é uma doença?'] A interrogação 'Será que eu amadureci?', no contexto do 4º parágrafo, deriva da seguinte percepção que o autor passou a ter:"
    alternativas:
      - "há um amadurecimento em quem incorpora o excesso dos devaneios."
      - "um traço previsível da maturidade é o afastar-se do mundo enfadonho."
      - "contar histórias evita que se forjem devaneios sem sentido."
      - "narrar algo de modo criativo relativiza a pressão do devaneio."
      - "a maturidade de um escritor abole a necessidade de sonhar."
  3:
    enunciado: "[Texto 'O devaneio é uma doença?'] Ao atentar para a estruturação do texto, observa-se que:"
    alternativas:
      - "no 4º parágrafo fala alto a experiência de um escritor que aproveitou seus devaneios para intensificar a atmosfera fantasiosa de suas narrativas."
      - "no 5º parágrafo o autor se propõe a demonstrar que não há a possibilidade objetiva de se distinguir as operações de um devaneio das experiências reais."
      - "no 1º parágrafo a leitora Ana manifesta seu repúdio aos devaneios por conta da ilusão de felicidade e do prazer gratuito desses sonhos profundos."
      - "no 2º parágrafo o autor caracteriza o devaneio como um sonho dentro da vigília, que em sua adolescência lhe parecia bem diverso de como Ana o vê."
      - "no 3º parágrafo afirma-se que na adolescência, tal como ocorreu com a do autor, pode-se valer do devaneio para fugir dos limites de situações impostas."
  4:
    enunciado: "[Texto 'O devaneio é uma doença?'] As normas de concordância verbal estão plenamente observadas na frase:"
    alternativas:
      - "É possível que o interesse pelo trabalho ou pelo amor venham a suprir os devaneios."
      - "Sempre haverá os que querem que o sujeito dos sonhos se submeta a limitações."
      - "São nos nossos devaneios que projetamos as realidades que mais nos convém."
      - "Desprendem-se dos sonhos, quando marcantes, o que gostaríamos que permanecessem."
      - "Não falta à curiosidade da leitora Ana respostas que também busca o autor do texto."
  5:
    enunciado: "[Texto 'O devaneio é uma doença?'] Em 'Infelizmente, enquanto a gente sonha sossegado, alguns se esforçam para transformar o devaneio num transtorno', numa nova redação que mantenha a correção e o sentido básico, o elemento sublinhado ('alguns se esforçam') pode ser adequadamente substituído por:"
    alternativas:
      - "muitos hão de implementar no devaneio uma transformação transtornada."
      - "várias pessoas laboram em constituir no devaneio como uma alucinação."
      - "há os que não titubeiam para se transtornar um devaneio."
      - "tem gente que não mede estratagemas para que um devaneio se transtorne."
      - "não faltam os que se aplicam em fazer do devaneio uma perturbação."
  6:
    enunciado: "[Texto 'O devaneio é uma doença?'] Considerando-se o contexto, traduz-se adequadamente o sentido de um segmento do texto em:"
    alternativas:
      - "mereceria o enfado que ela lhe inspira (4º parágrafo) = faria jus ao tédio que ela lhe incute."
      - "sem devanear mal consigo inventar (5º parágrafo) = nem a fuga do sonho me leva a criar."
      - "fugindo para esse lugar fictício (1º parágrafo) = subtraindo-me o espaço ficcional."
      - "o devaneio era meu aliado (2º parágrafo) = alienava-me no meu devanear."
      - "aos poucos meu devaneio se acalmasse (4º parágrafo) = minimamente contornasse o meu sonho."
  7:
    enunciado: "[Com base no texto 'Humanos e máquinas', de Yuval Noah Harari] Ao longo do texto, o autor trabalha com a hipótese de que o ser humano,"
    alternativas:
      - "em vista de uma forçosa conexão sua com a rede, precisará estar na regência dos poderes dessa conexão."
      - "compulsoriamente conectado com a rede, buscará constituir uma elite para poder competir com a mídia."
      - "caso admita vir a estar conectado com a rede, usufruirá dos novos benefícios que ela lhe reserva."
      - "tentado que está a se integrar ao sistema digital, deve buscar uma forma de fugir da tirania da eletrônica."
      - "voltado ao convívio com as máquinas, deve tentar aperfeiçoá-las tecnicamente para auferir vantagens socioeconômicas."
  8:
    enunciado: "[Texto 'Humanos e máquinas'] Entre os efeitos que advirão de uma completa fusão do homem com as máquinas, o mais grave deles, sendo estrutural, representa-se nesta expressão do texto:"
    alternativas:
      - "meu cérebro e minha vida pertencem a mim (2º parágrafo)"
      - "impedir que a humanidade se fragmente em castas biológicas (2º parágrafo)"
      - "serviços de saúde talvez se recusem a cuidar de você (1º parágrafo)"
      - "empregadores talvez se recusem a empregá-lo (1º parágrafo)"
      - "adquirir o poder de fazer a engenharia da vida (2º parágrafo)"
  9:
    enunciado: "[Texto 'Humanos e máquinas'] Em 'Melhor será invocar juristas, políticos, filósofos e artistas para que voltem sua atenção para esta charada', o sentido e a correção da frase estarão preservados caso se substituam os elementos sublinhados ('invocar' e 'voltem sua atenção para esta'), na ordem dada, por:"
    alternativas:
      - "ir onde se encontrem — dediquem-se com a razão desta"
      - "apelar a ação de — instaurem o significado desta"
      - "requerer os préstimos de — se apliquem na questão desta"
      - "valer-se com esses — se detenham ao sentido desta"
      - "recorrer de tais — proponham-se a elucidar nesta"
  10:
    enunciado: "[Texto 'Humanos e máquinas'] Na reconstrução de uma frase do texto, há adequada correlação entre os tempos e modos verbais em:"
    alternativas:
      - "A solução política mais factível haveria de ser esta, desde que a tenhamos considerado em sua gravidade."
      - "À medida que os dados fluírem das máquinas para o nosso corpo, terá sido fácil para as empresas controlar-nos a todos."
      - "Homens e máquinas poderiam se fundir tão completamente que os homens não terão sido capazes de sobreviver."
      - "Se tivéssemos querido evitar que uma pequena elite mobilizasse esses poderes, a questão-chave teria sido desafiadora."
      - "Melhor teria sido invocarmos filósofos, políticos e artistas para que nos venham a ajudar naquela charada."
  11:
    enunciado: "Considere que o tempo de vida de um componente eletrônico segue uma distribuição exponencial. Se esse componente já está funcionando há 500 horas, a probabilidade de esse componente funcionar por mais 100 horas, em comparação à probabilidade de um componente novo funcionar pelas mesmas 100 horas,"
    alternativas:
      - "é nula, pois a distribuição exponencial define um tempo de vida máximo fixo que é atingido logo após as 500 horas."
      - "depende do parâmetro da densidade, sendo impossível fazer afirmações sobre seu tempo de vida sem realizar o cálculo da integral da função densidade."
      - "é significativamente menor, pois o componente já sofreu desgaste físico durante as 500 horas iniciais."
      - "é maior, pois o fato de ter durado 500 horas prova que o componente é de alta qualidade."
      - "é exatamente a mesma, pois a distribuição assume que a chance de falha futura não depende do tempo que já passou."
  12:
    enunciado: "Deseja-se estimar a proporção de empresas que não estão com os impostos pagos. Para tanto foram feitas várias visitas a empresas. Supondo que todas as hipóteses estejam satisfeitas, o menor tamanho do grupo a ser investigado para garantir que a proporção de inadimplentes na amostra difira por menos de 2% da verdadeira proporção de inadimplentes na população com probabilidade superior a 90% é (utilize Z₀,₉₀ = 1,64):"
    alternativas:
      - "1081"
      - "2381"
      - "1381"
      - "1681"
      - "2011"
  13:
    enunciado: "Um fabricante de computadores descobre que 10% de seus chips falham no teste de controle de qualidade. A probabilidade de que pelo menos um dos primeiros três chips que saem da linha de produção seja defeituoso é"
    alternativas:
      - "0,729"
      - "0,199"
      - "0,999"
      - "0,271"
      - "0,001"
  14:
    enunciado: "Considere os eventos A, B e C. Sabe-se que A e B são disjuntos e que P(A∪C) = P(B∪C) = P(A∪B∪C) = ⅚. Então o valor de P(C) é"
    alternativas:
      - "2/3"
      - "3/4"
      - "1/2"
      - "1/4"
      - "1/3"
  15:
    enunciado: "Em uma cidade, chove em um terço dos dias. Dado que está chovendo, haverá trânsito pesado com certa probabilidade; e dado que não está chovendo, haverá trânsito pesado com outra probabilidade. Se estiver chovendo e houver trânsito pesado, chego atrasado ao trabalho com determinada probabilidade; a probabilidade de me atrasar é reduzida caso não esteja chovendo e não haja trânsito pesado; e nas demais situações (chuvoso e sem trânsito, ou não chuvoso e com trânsito) a probabilidade de atraso é outra. Em um dia qualquer, a probabilidade de eu chegar atrasado é [enunciado com frações corrompidas no OCR]"
    alternativas:
      - "11/48"
      - "7/48"
      - "19/48"
      - "17/48"
      - "13/48"
  16:
    enunciado: "Se, ao lançarmos uma moeda 3 vezes, aparecerem 3 caras ou 3 coroas, decidimos rejeitar H₀: p = ½ contra H₁: p ≠ ½. A probabilidade do erro tipo II se p = ¾ é [alternativas ilegíveis no OCR]"
    alternativas:
      - "[alternativa A ilegível no OCR]"
      - "[alternativa B ilegível no OCR]"
      - "[alternativa C ilegível no OCR]"
      - "[alternativa D ilegível no OCR]"
      - "[alternativa E ilegível no OCR]"
  17:
    enunciado: "[Teste Qui-Quadrado; tabela de contingência Tipo de Indústria × pagamento de impostos: Tempestivo (Farmacêutica 60, Metalúrgica 25, Têxtil 15; total 100) e Intempestivo (20, 50, 30; total 100); totais por coluna 80, 75, 45; total geral 200] Supondo que a hipótese de independência seja verdadeira, o número esperado de metalúrgicas que não pagam seus impostos em dia é"
    alternativas:
      - "40,0"
      - "37,0"
      - "45,0"
      - "15,0"
      - "37,5"
  18:
    enunciado: "[Mesmos dados da questão 17; teste qui-quadrado de independência] Supondo que todas as hipóteses estão satisfeitas, o teste qui-quadrado para a hipótese nula de independência foi realizado e obteve-se χ² = 33,33. Com base na tabela da distribuição qui-quadrado fornecida (gl = 2: valores críticos 5,991 a 5%; 7,378 a 2,5%; 9,210 a 1%; 10,597 a 0,5%), a conclusão do teste é:"
    alternativas:
      - "Não se rejeita a hipótese nula, pois χ² é menor do que duas vezes 18,548."
      - "Rejeita-se a hipótese nula, pois χ² é maior do que 10,597."
      - "Rejeita-se a hipótese nula, pois χ² é maior do que duas vezes 7,879."
      - "Rejeita-se a hipótese nula, pois χ² é maior do que 7,879."
      - "Rejeita-se a hipótese, pois χ² é maior do que 16,750."
  19:
    enunciado: "Em uma aplicação financeira A, com juros simples de 2% ao mês, foi aplicado o valor de R$ 10.000,00. Em outra aplicação financeira B, com juros compostos de 1% ao mês, foi aplicado também o valor de R$ 10.000,00. Após dois meses, sem qualquer retirada das duas aplicações, a diferença entre os dois montantes é"
    alternativas:
      - "R$ 299,00"
      - "R$ 199,00"
      - "R$ 100,00"
      - "R$ 119,00"
      - "R$ 219,00"
  20:
    enunciado: "Em uma loja, um celular pode ser comprado à vista com desconto de 5% no valor anunciado ou a prazo em duas parcelas fixas, sem acréscimo, sendo a 1ª parcela na entrada e a 2ª parcela depois de 30 dias. O valor aproximado da taxa mensal de juros praticada nessa loja é"
    alternativas:
      - "12%"
